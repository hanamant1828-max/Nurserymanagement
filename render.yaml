services:
  - type: web
    name: kisan-nursery
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && node script/build.mjs
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
